name: Update public appeal cases

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"

permissions:
  contents: write

jobs:
  update-public-cases:
    runs-on: ubuntu-latest
    env:
      APP_MODE: cloud_public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cloud.txt

      - name: Update public cases
        run: |
          python scripts/update_public_cases.py --sleep 1.5

      - name: Verify public database
        run: |
          python scripts/search_db.py 導師 --limit 1

      - name: Commit public data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cases.csv data/discovered_cids.txt data/downloaded_cids.txt data/failed_cids.txt data/crawl_state.json data/raw_html data/texts data/appeal_cases.db
          if git diff --cached --quiet; then
            echo "No public data changes to commit."
          else
            git commit -m "Update public appeal cases"
            git push
          fi
