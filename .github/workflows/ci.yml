name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_MODE: cloud_public
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile scripts/*.py app/streamlit_app.py

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Health check without local AI
        run: |
          python scripts/health_check.py --skip-ai

      - name: Verify public data consistency
        run: |
          python - <<'PY'
          import csv
          import sqlite3
          from pathlib import Path

          with open("data/cases.csv", encoding="utf-8-sig", newline="") as fh:
              case_cids = {row["cid"].strip() for row in csv.DictReader(fh) if row.get("cid", "").strip()}
          text_cids = {path.stem for path in Path("data/texts").glob("*.txt")}
          html_cids = {path.stem for path in Path("data/raw_html").glob("*.html")}
          downloaded = {
              line.strip()
              for line in Path("data/downloaded_cids.txt").read_text(encoding="utf-8").splitlines()
              if line.strip()
          }
          with sqlite3.connect("data/appeal_cases.db") as conn:
              db_count = conn.execute("select count(*) from cases").fetchone()[0]
              fts_count = conn.execute("select count(*) from cases_fts").fetchone()[0]
          assert case_cids == text_cids == html_cids == downloaded
          assert db_count == fts_count == len(case_cids)
          print(f"public_cases={len(case_cids)}")
          PY
